<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案B - 左右双栏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF8C42;
      --primary-light: #FFB07A;
      --primary-dark: #E67530;
      --secondary: #FFD166;
      --bg: #FFF8F0;
      --card-bg: #FFFFFF;
      --text: #4A3728;
      --text-light: #A08B7A;
      --text-lighter: #C4B5A8;
      --border: #F0E6DD;
      --success: #6BCB77;
      --danger: #FF6B6B;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 20px rgba(255, 140, 66, 0.12);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    .plan-tag {
      display: inline-block;
      padding: 4px 14px;
      background: linear-gradient(135deg, #4A90D9, #74B9FF);
      color: #fff;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .desc { color: var(--text-light); font-size: 0.88rem; margin-bottom: 24px; }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ===== 双栏布局 ===== */
    .dual-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 20px 12px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }
    .section-title .icon { font-size: 1.1rem; }
    .section-title .count {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--text-lighter);
      font-weight: 500;
      background: var(--bg);
      padding: 2px 10px;
      border-radius: 10px;
    }

    /* ===== 左侧 - 日程时间轴 ===== */
    .schedule-panel .timeline {
      position: relative;
      padding: 0 16px 16px 64px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 46px;
      top: 0;
      bottom: 16px;
      width: 2px;
      background: linear-gradient(to bottom, var(--primary), rgba(255, 140, 66, 0.1));
      border-radius: 2px;
    }
    .t-item {
      position: relative;
      display: flex;
      align-items: stretch;
      margin-bottom: 6px;
    }
    .t-item::before {
      content: '';
      position: absolute;
      left: -24px;
      top: 14px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--card-bg);
      box-shadow: 0 0 0 2px rgba(255, 140, 66, 0.2);
      z-index: 1;
    }
    .t-item.done::before {
      background: var(--success);
      box-shadow: 0 0 0 2px rgba(107, 203, 119, 0.2);
    }
    .t-item.now::before {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.25);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.25); }
      50% { box-shadow: 0 0 0 6px rgba(255, 107, 107, 0.1); }
    }
    .t-time {
      position: absolute;
      left: -58px;
      top: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary-dark);
      text-align: right;
      width: 30px;
      font-variant-numeric: tabular-nums;
    }
    .t-card {
      flex: 1;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      cursor: pointer;
    }
    .t-card:hover { background: rgba(255, 140, 66, 0.05); }
    .t-card .t-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .t-card .t-title.text-done {
      text-decoration: line-through;
      color: var(--text-lighter);
    }
    .t-card .t-span {
      font-size: 0.7rem;
      color: var(--text-lighter);
      margin-top: 2px;
    }
    .t-status {
      display: inline-flex;
      align-items: center;
      padding: 1px 8px;
      border-radius: 8px;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .t-status.s-done { background: rgba(107, 203, 119, 0.15); color: #2d8a3e; }
    .t-status.s-now { background: rgba(255, 107, 107, 0.12); color: #d63031; }
    .t-status.s-upcoming { background: rgba(255, 140, 66, 0.1); color: var(--primary-dark); }

    /* 时间刻度背景 */
    .hour-marks {
      position: absolute;
      left: 64px;
      right: 16px;
      top: 0;
      bottom: 16px;
      pointer-events: none;
    }

    /* ===== 右侧 - 待办 ===== */
    .todo-panel .todo-list { padding: 0 16px 16px; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 8px;
      border-bottom: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .todo-item:hover { background: rgba(255, 140, 66, 0.03); }
    .todo-item:last-child { border-bottom: none; }
    .todo-item.p-high { border-left-color: var(--danger); }
    .todo-item.p-mid { border-left-color: var(--secondary); }
    .todo-item.p-low { border-left-color: var(--success); }

    .chk {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0; color: #fff;
      cursor: pointer;
      transition: all 0.3s;
    }
    .chk.checked { background: var(--success); border-color: var(--success); font-size: 0.65rem; }
    .todo-text { flex: 1; font-size: 0.88rem; }
    .todo-text.done { text-decoration: line-through; color: var(--text-lighter); }
    .carried {
      font-size: 0.62rem;
      padding: 2px 8px;
      border-radius: 8px;
      color: #fff;
      white-space: nowrap;
    }
    .carried.warn { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
    .carried.danger { background: linear-gradient(135deg, #FF6B6B, #FF4757); }
    .del {
      width: 22px; height: 22px;
      border: none; border-radius: 50%;
      background: transparent;
      color: var(--text-lighter);
      cursor: pointer;
      font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center;
    }
    .del:hover { background: rgba(255, 107, 107, 0.12); color: var(--danger); }

    @media (max-width: 700px) {
      .dual-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="plan-tag">方案 B</span>
    <h1>左右双栏布局</h1>
    <p class="desc">左侧日程时间线，右侧待办清单，一目了然</p>

    <div class="dual-layout">
      <!-- 左：日程 -->
      <div class="schedule-panel card">
        <div class="section-title">
          <span class="icon">📅</span> 今日日程
          <span class="count">4 项</span>
        </div>
        <div class="timeline">
          <div class="t-item done">
            <div class="t-time">09:00</div>
            <div class="t-card">
              <div class="t-title text-done">团队晨会 <span class="t-status s-done">✓ 已结束</span></div>
              <div class="t-span">09:00 - 10:00 · 1小时</div>
            </div>
          </div>

          <div class="t-item done">
            <div class="t-time">10:00</div>
            <div class="t-card">
              <div class="t-title text-done">产品需求评审 <span class="t-status s-done">✓ 已结束</span></div>
              <div class="t-span">10:00 - 11:00 · 1小时</div>
            </div>
          </div>

          <div class="t-item now">
            <div class="t-time">13:00</div>
            <div class="t-card" style="background: rgba(255, 107, 107, 0.05);">
              <div class="t-title">跳舞课 <span class="t-status s-now">● 进行中</span></div>
              <div class="t-span">13:00 - 14:00 · 1小时</div>
            </div>
          </div>

          <div class="t-item">
            <div class="t-time">16:00</div>
            <div class="t-card">
              <div class="t-title">项目复盘会 <span class="t-status s-upcoming">待开始</span></div>
              <div class="t-span">16:00 - 17:00 · 1小时</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 右：待办 -->
      <div class="todo-panel card">
        <div class="section-title">
          <span class="icon">✏️</span> 待办事项
          <span class="count">2/6 完成</span>
        </div>
        <div class="todo-list">
          <div class="todo-item p-high">
            <div class="chk checked">✓</div>
            <span class="todo-text done">写音频汇报大纲</span>
            <span class="carried warn">顺延1天</span>
            <button class="del">✕</button>
          </div>
          <div class="todo-item p-high">
            <div class="chk checked">✓</div>
            <span class="todo-text done">联系简历对象发测试题</span>
            <span class="carried danger">顺延3天</span>
            <button class="del">✕</button>
          </div>
          <div class="todo-item p-mid">
            <div class="chk"></div>
            <span class="todo-text">帮梓潇检查音乐设置</span>
            <span class="carried warn">顺延1天</span>
            <button class="del">✕</button>
          </div>
          <div class="todo-item p-mid">
            <div class="chk"></div>
            <span class="todo-text">报销插件</span>
            <span class="carried warn">顺延1天</span>
            <button class="del">✕</button>
          </div>
          <div class="todo-item p-low">
            <div class="chk"></div>
            <span class="todo-text">统计增量回复琛哥</span>
            <button class="del">✕</button>
          </div>
          <div class="todo-item p-low">
            <div class="chk"></div>
            <span class="todo-text">同步最新音频功能设计</span>
            <button class="del">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
